version: "3.8"

services:
  frontend:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
    # optional environment for production
    environment:
      - NODE_ENV=production

  api:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - ./server/data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
